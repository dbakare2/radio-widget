<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big E Radio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Special+Elite&family=Cutive+Mono&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cutive Mono', monospace;
            background: linear-gradient(135deg, #e8dcc8 0%, #d4c4a8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(139, 111, 78, 0.03) 2px,
                    rgba(139, 111, 78, 0.03) 4px
                );
            pointer-events: none;
            opacity: 0.5;
        }
        
        .radio-body {
            background: linear-gradient(145deg, #c4a57b 0%, #a8906f 100%);
            border-radius: 24px;
            padding: 45px 40px;
            max-width: 650px;
            width: 100%;
            box-shadow: 
                0 20px 50px rgba(78, 59, 38, 0.3),
                inset 0 2px 0 rgba(255, 255, 255, 0.2),
                inset 0 -3px 0 rgba(0, 0, 0, 0.2);
            border: 3px solid #8b6f4e;
            position: relative;
        }
        
        .radio-body::before {
            content: '';
            position: absolute;
            top: 25px;
            left: 25px;
            right: 25px;
            bottom: 25px;
            border: 1px solid rgba(139, 111, 78, 0.4);
            border-radius: 16px;
            pointer-events: none;
        }
        
        .wood-grain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 24px;
            background-image: 
                repeating-linear-gradient(
                    90deg,
                    rgba(139, 111, 78, 0.1) 0px,
                    transparent 1px,
                    transparent 2px,
                    rgba(139, 111, 78, 0.1) 3px
                );
            pointer-events: none;
            opacity: 0.3;
        }
        
        .brand-label {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
            z-index: 1;
        }
        
        .brand-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #4a3425;
            text-shadow: 
                1px 1px 0 rgba(255, 255, 255, 0.3),
                0 2px 3px rgba(0, 0, 0, 0.2);
            margin-bottom: 8px;
            font-style: italic;
        }
        
        .brand-tagline {
            font-family: 'Special Elite', monospace;
            font-size: 12px;
            color: #6b5438;
            letter-spacing: 1px;
        }
        
        .display-panel {
            background: linear-gradient(180deg, #f5ede0 0%, #e8dcc8 100%);
            border-radius: 16px;
            padding: 35px 30px;
            margin-bottom: 40px;
            border: 4px solid #8b6f4e;
            box-shadow: 
                inset 0 3px 12px rgba(78, 59, 38, 0.15),
                0 2px 8px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 1;
        }
        
        .display-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 12px;
            background: 
                radial-gradient(
                    ellipse at center,
                    transparent 0%,
                    rgba(139, 111, 78, 0.03) 100%
                );
            pointer-events: none;
        }
        
        .frequency-display {
            font-family: 'Cormorant Garamond', serif;
            font-size: 64px;
            font-weight: 700;
            color: #6b4423;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 12px;
            line-height: 1;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }
        
        .station-name {
            font-family: 'Special Elite', monospace;
            font-size: 14px;
            color: #8b6f4e;
            text-align: center;
            letter-spacing: 1px;
            min-height: 18px;
        }
        
        .frequency-bar {
            margin-top: 20px;
            height: 8px;
            background: rgba(139, 111, 78, 0.2);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(107, 68, 35, 0.2);
        }
        
        .frequency-progress {
            position: absolute;
            height: 100%;
            background: linear-gradient(90deg, 
                #c4a57b 0%, 
                #8b6f4e 50%,
                #c4a57b 100%);
            transition: width 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
            border-radius: 3px;
            box-shadow: 0 0 8px rgba(107, 68, 35, 0.3);
        }
        
        .tuning-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }
        
        .arrow-btn {
            background: radial-gradient(circle at 30% 30%, 
                #d4c4a8 0%, 
                #b8a184 100%);
            border: 3px solid #8b6f4e;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 
                0 5px 15px rgba(78, 59, 38, 0.3),
                inset 0 2px 0 rgba(255, 255, 255, 0.3),
                inset 0 -2px 3px rgba(0, 0, 0, 0.2);
            position: relative;
            font-family: 'Cormorant Garamond', serif;
            font-size: 40px;
            color: #4a3425;
            font-weight: 700;
        }
        
        .arrow-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 85%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255, 255, 255, 0.3),
                transparent);
            pointer-events: none;
        }
        
        .arrow-btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 20px rgba(78, 59, 38, 0.35),
                inset 0 2px 0 rgba(255, 255, 255, 0.4),
                inset 0 -2px 3px rgba(0, 0, 0, 0.2);
        }
        
        .arrow-btn:active {
            transform: translateY(0);
            box-shadow: 
                0 2px 8px rgba(78, 59, 38, 0.3),
                inset 0 3px 6px rgba(0, 0, 0, 0.3);
        }
        
        .station-counter {
            background: linear-gradient(145deg, #f5ede0 0%, #e8dcc8 100%);
            border: 3px solid #8b6f4e;
            border-radius: 12px;
            padding: 16px 32px;
            box-shadow: 
                inset 0 2px 8px rgba(78, 59, 38, 0.15),
                0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .counter-label {
            font-family: 'Special Elite', monospace;
            font-size: 9px;
            color: #8b6f4e;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        
        .counter-display {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            color: #6b4423;
            text-align: center;
            font-weight: 700;
        }
        
        .playback-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding-top: 30px;
            border-top: 2px solid rgba(139, 111, 78, 0.3);
            position: relative;
            z-index: 1;
        }
        
        .play-btn {
            background: radial-gradient(circle at 30% 30%, 
                #c99656 0%, 
                #a67c52 100%);
            border: 3px solid #8b6f4e;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 
                0 6px 18px rgba(107, 68, 35, 0.3),
                inset 0 2px 0 rgba(255, 255, 255, 0.3),
                inset 0 -2px 3px rgba(0, 0, 0, 0.2);
            position: relative;
        }
        
        .play-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 85%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255, 255, 255, 0.4),
                transparent);
            pointer-events: none;
        }
        
        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 
                0 8px 22px rgba(107, 68, 35, 0.35),
                inset 0 2px 0 rgba(255, 255, 255, 0.3),
                inset 0 -2px 3px rgba(0, 0, 0, 0.2);
        }
        
        .play-btn:active {
            transform: scale(0.98);
            box-shadow: 
                0 3px 10px rgba(107, 68, 35, 0.3),
                inset 0 3px 6px rgba(0, 0, 0, 0.3);
        }
        
        .play-btn svg {
            width: 26px;
            height: 26px;
            fill: #4a3425;
            position: relative;
            z-index: 1;
        }
        
        .volume-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .volume-icon {
            width: 24px;
            height: 24px;
            fill: #6b4423;
            opacity: 0.7;
        }
        
        .volume-slider {
            width: 120px;
            height: 8px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(139, 111, 78, 0.25);
            border-radius: 4px;
            outline: none;
            border: 1px solid rgba(107, 68, 35, 0.2);
        }
        
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            background: radial-gradient(circle at 30% 30%, 
                #c99656 0%, 
                #a67c52 100%);
            border: 2px solid #8b6f4e;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 
                0 2px 6px rgba(78, 59, 38, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        
        .volume-slider::-moz-range-thumb {
            width: 22px;
            height: 22px;
            background: radial-gradient(circle at 30% 30%, 
                #c99656 0%, 
                #a67c52 100%);
            border: 2px solid #8b6f4e;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 
                0 2px 6px rgba(78, 59, 38, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        
        .tuning .frequency-display {
            animation: subtle-fade 0.3s ease;
        }
        
        @keyframes subtle-fade {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        @media (max-width: 768px) {
            .radio-body {
                padding: 35px 25px;
            }
            
            .brand-name {
                font-size: 38px;
            }
            
            .brand-tagline {
                font-size: 11px;
            }
            
            .frequency-display {
                font-size: 52px;
            }
            
            .arrow-btn {
                width: 65px;
                height: 65px;
                font-size: 36px;
            }
            
            .station-counter {
                padding: 14px 24px;
            }
            
            .counter-display {
                font-size: 24px;
            }
            
            .volume-slider {
                width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="radio-body">
        <div class="wood-grain"></div>
        
        <div class="brand-label">
            <div class="brand-name">big e radio</div>
            <div class="brand-tagline">for all your whimsical needs</div>
        </div>
        
        <div class="display-panel">
            <div class="frequency-display" id="frequencyDisplay">88.5</div>
            <div class="station-name" id="stationName">Press arrows to tune</div>
            <div class="frequency-bar">
                <div class="frequency-progress" id="frequencyProgress" style="width: 20%"></div>
            </div>
        </div>
        
        <div class="tuning-controls">
            <button class="arrow-btn" id="prevBtn" aria-label="Previous station">‹</button>
            
            <div class="station-counter">
                <div class="counter-label">Station</div>
                <div class="counter-display" id="stationCounter">1 / 5</div>
            </div>
            
            <button class="arrow-btn" id="nextBtn" aria-label="Next station">›</button>
        </div>
        
        <div class="playback-section">
            <button class="play-btn" id="playPauseBtn" aria-label="Play/Pause">
                <svg id="playIcon" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display: none;">
                    <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
                </svg>
            </button>
            
            <div class="volume-section">
                <svg class="volume-icon" viewBox="0 0 24 24">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                </svg>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70" aria-label="Volume">
            </div>
        </div>
    </div>
    
    <script>
        // ============================================
        // CONFIGURATION - EDIT YOUR STATIONS HERE
        // ============================================
        
        const stations = [
            {
                frequency: '88.5',
                name: 'Station 1',
                url: 'your-first-track.mp3'  // Replace with your MP3 filename
            },
            {
                frequency: '91.2',
                name: 'Station 2',
                url: 'your-second-track.mp3'
            },
            {
                frequency: '95.8',
                name: 'Station 3',
                url: 'your-third-track.mp3'
            },
            {
                frequency: '99.4',
                name: 'Station 4',
                url: 'your-fourth-track.mp3'
            },
            {
                frequency: '103.7',
                name: 'Station 5',
                url: 'your-fifth-track.mp3'
            }
        ];
        
        // ============================================
        // RADIO LOGIC
        // ============================================
        
        let currentStation = 0;
        let audio = new Audio();
        let isPlaying = false;
        
        const frequencyDisplay = document.getElementById('frequencyDisplay');
        const stationName = document.getElementById('stationName');
        const frequencyProgress = document.getElementById('frequencyProgress');
        const stationCounter = document.getElementById('stationCounter');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const volumeSlider = document.getElementById('volumeSlider');
        const radioBody = document.querySelector('.radio-body');
        
        // Initialize
        updateStation(currentStation);
        audio.volume = volumeSlider.value / 100;
        
        // Navigation buttons
        prevBtn.addEventListener('click', () => {
            const newStation = currentStation - 1 < 0 ? stations.length - 1 : currentStation - 1;
            changeStation(newStation);
        });
        
        nextBtn.addEventListener('click', () => {
            const newStation = (currentStation + 1) % stations.length;
            changeStation(newStation);
        });
        
        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                prevBtn.click();
            } else if (e.key === 'ArrowRight') {
                nextBtn.click();
            } else if (e.key === ' ') {
                e.preventDefault();
                playPauseBtn.click();
            }
        });
        
        function changeStation(index) {
            if (index === currentStation) return;
            
            // Add tuning effect
            radioBody.classList.add('tuning');
            setTimeout(() => {
                radioBody.classList.remove('tuning');
            }, 300);
            
            const wasPlaying = isPlaying;
            if (isPlaying) {
                audio.pause();
            }
            
            currentStation = index;
            updateStation(index);
            
            if (wasPlaying) {
                audio.play().catch(e => console.log('Playback failed:', e));
            }
        }
        
        function updateStation(index) {
            const station = stations[index];
            frequencyDisplay.textContent = station.frequency;
            stationName.textContent = station.name;
            stationCounter.textContent = `${index + 1} / ${stations.length}`;
            audio.src = station.url;
            
            // Update progress bar
            const progress = ((index + 1) / stations.length) * 100;
            frequencyProgress.style.width = `${progress}%`;
        }
        
        // Playback controls
        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            } else {
                audio.play().catch(e => {
                    console.log('Playback failed:', e);
                    alert('Could not play audio. Make sure your MP3 URLs are correct and accessible.');
                });
                isPlaying = true;
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            }
        });
        
        audio.addEventListener('ended', () => {
            isPlaying = false;
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        });
        
        // Volume control
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value / 100;
        });
    </script>
</body>
</html>
