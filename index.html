<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Radio Dial</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Bebas+Neue&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier Prime', monospace;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .radio-container {
            position: relative;
            max-width: 800px;
            width: 100%;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.5));
        }
        
        .radio-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }
        
        .controls-overlay {
            position: absolute;
            bottom: 15%;
            right: 15%;
            width: 20%;
            height: 25%;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        
        .dial {
            position: relative;
            width: 45%;
            height: 80%;
            cursor: grab;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .dial:active {
            cursor: grabbing;
        }
        
        .dial::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255, 255, 255, 0.2), 
                rgba(0, 0, 0, 0.3));
            pointer-events: none;
        }
        
        .dial::after {
            content: '';
            position: absolute;
            width: 15%;
            height: 15%;
            background: #fff;
            border-radius: 50%;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            pointer-events: none;
        }
        
        .info-panel {
            position: absolute;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #2d1810 0%, #1a0f0a 100%);
            border: 3px solid #d4a574;
            border-radius: 12px;
            padding: 20px 30px;
            min-width: 300px;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .station-display {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            color: #ff6b35;
            text-align: center;
            letter-spacing: 3px;
            text-shadow: 
                0 0 20px rgba(255, 107, 53, 0.6),
                0 0 40px rgba(255, 107, 53, 0.3);
            margin-bottom: 10px;
            line-height: 1;
        }
        
        .track-name {
            font-size: 14px;
            color: #d4a574;
            text-align: center;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.9;
        }
        
        .frequency-bar {
            margin-top: 15px;
            height: 4px;
            background: rgba(212, 165, 116, 0.2);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }
        
        .frequency-indicator {
            position: absolute;
            height: 100%;
            width: 20px;
            background: linear-gradient(90deg, 
                transparent, 
                #ff6b35, 
                transparent);
            box-shadow: 0 0 10px #ff6b35;
            transition: left 0.3s ease;
        }
        
        .playback-controls {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .control-btn {
            background: linear-gradient(135deg, #d4a574 0%, #a67c52 100%);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 
                0 4px 10px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        
        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 6px 15px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        
        .control-btn:active {
            transform: translateY(0);
        }
        
        .control-btn svg {
            width: 20px;
            height: 20px;
            fill: #2d1810;
        }
        
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .volume-slider {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(212, 165, 116, 0.3);
            border-radius: 2px;
            outline: none;
        }
        
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #d4a574;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        
        .volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #d4a574;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        
        .static-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(255, 255, 255, 0.05) 1px,
                rgba(0, 0, 0, 0.1) 2px
            );
            animation: static 0.1s infinite;
            z-index: 1000;
        }
        
        @keyframes static {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }
        
        .station-changing .static-effect {
            opacity: 0.3;
        }
        
        @media (max-width: 768px) {
            .info-panel {
                min-width: 250px;
                padding: 15px 20px;
            }
            
            .station-display {
                font-size: 36px;
            }
            
            .track-name {
                font-size: 12px;
            }
        }
    </style>
</head>

        <div class="info-panel">
            <div class="station-display" id="stationDisplay">FM 88.5</div>
            <div class="track-name" id="trackName">Turn the dial to tune in</div>
            <div class="frequency-bar">
                <div class="frequency-indicator" id="frequencyIndicator"></div>
            </div>
        </div>
        
        <div class="controls-overlay">
            <div class="dial" id="dial"></div>
        </div>
        
        <div class="playback-controls">
            <button class="control-btn" id="playPauseBtn" title="Play/Pause">
                <svg id="playIcon" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display: none;">
                    <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
                </svg>
            </button>
            
            <div class="volume-control">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#d4a574">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                </svg>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
            </div>
        </div>
    </div>
    
    <div class="static-effect" id="staticEffect"></div>
    
    <script>
        // ============================================
        // CONFIGURATION - EDIT YOUR STATIONS HERE
        // ============================================
        
        const stations = [
            {
                frequency: '88.5',
                name: 'Station 1',
                url: 'boroughs.mp3'  // Replace with your MP3 URL
            },
            {
                frequency: '91.2',
                name: 'Station 2',
                url: 'chatshow-intro.mp3'  // Replace with your MP3 URL
            },
            {
                frequency: '95.8',
                name: 'Station 3',
                url: 'vintage-radio-skit.mp3'  // Replace with your MP3 URL
            },
            {
                frequency: '99.4',
                name: 'Station 4',
                url: 'trailer-broadcast-big-e-radio.mp3'  // Replace with your MP3 URL
            },
        ];
        
        // ============================================
        // RADIO LOGIC - Don't edit below unless you know what you're doing
        // ============================================
        
        let currentStation = 0;
        let audio = new Audio();
        let isPlaying = false;
        let isDragging = false;
        
        const dial = document.getElementById('dial');
        const stationDisplay = document.getElementById('stationDisplay');
        const trackName = document.getElementById('trackName');
        const frequencyIndicator = document.getElementById('frequencyIndicator');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const volumeSlider = document.getElementById('volumeSlider');
        const staticEffect = document.getElementById('staticEffect');
        const radioContainer = document.querySelector('.radio-container');
        
        // Initialize
        updateStation(currentStation);
        audio.volume = volumeSlider.value / 100;
        
        // Dial interaction
        let startAngle = 0;
        let currentAngle = 0;
        
        function getAngle(e, element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            const deltaX = clientX - centerX;
            const deltaY = clientY - centerY;
            
            return Math.atan2(deltaY, deltaX) * (180 / Math.PI);
        }
        
        function handleDialStart(e) {
            isDragging = true;
            startAngle = getAngle(e, dial);
            dial.style.transition = 'none';
        }
        
        function handleDialMove(e) {
            if (!isDragging) return;
            
            e.preventDefault();
            const angle = getAngle(e, dial);
            const delta = angle - startAngle;
            currentAngle += delta;
            startAngle = angle;
            
            // Constrain angle to reasonable range
            currentAngle = Math.max(-180, Math.min(180, currentAngle));
            
            dial.style.transform = `rotate(${currentAngle}deg)`;
            
            // Map angle to station (normalized to 0-1)
            const normalizedPosition = (currentAngle + 180) / 360;
            const stationIndex = Math.floor(normalizedPosition * stations.length);
            const clampedIndex = Math.max(0, Math.min(stations.length - 1, stationIndex));
            
            if (clampedIndex !== currentStation) {
                changeStation(clampedIndex);
            }
            
            // Update frequency indicator
            frequencyIndicator.style.left = `${normalizedPosition * 100}%`;
        }
        
        function handleDialEnd() {
            if (!isDragging) return;
            isDragging = false;
            dial.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
        }
        
        // Mouse events
        dial.addEventListener('mousedown', handleDialStart);
        document.addEventListener('mousemove', handleDialMove);
        document.addEventListener('mouseup', handleDialEnd);
        
        // Touch events
        dial.addEventListener('touchstart', handleDialStart);
        document.addEventListener('touchmove', handleDialMove, { passive: false });
        document.addEventListener('touchend', handleDialEnd);
        
        // Click to jump to station
        dial.addEventListener('click', (e) => {
            if (Math.abs(currentAngle) < 5) { // Only if not dragging
                const nextStation = (currentStation + 1) % stations.length;
                changeStation(nextStation);
                
                // Animate dial to new position
                const targetAngle = (nextStation / stations.length) * 360 - 180;
                currentAngle = targetAngle;
                dial.style.transform = `rotate(${currentAngle}deg)`;
            }
        });
        
        function changeStation(index) {
            if (index === currentStation) return;
            
            // Add static effect during change
            radioContainer.classList.add('station-changing');
            setTimeout(() => {
                radioContainer.classList.remove('station-changing');
            }, 300);
            
            const wasPlaying = isPlaying;
            if (isPlaying) {
                audio.pause();
            }
            
            currentStation = index;
            updateStation(index);
            
            if (wasPlaying) {
                audio.play().catch(e => console.log('Playback failed:', e));
            }
        }
        
        function updateStation(index) {
            const station = stations[index];
            stationDisplay.textContent = `FM ${station.frequency}`;
            trackName.textContent = station.name;
            audio.src = station.url;
            
            // Update frequency indicator
            const position = index / (stations.length - 1);
            frequencyIndicator.style.left = `${position * 100}%`;
        }
        
        // Playback controls
        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            } else {
                audio.play().catch(e => {
                    console.log('Playback failed:', e);
                    alert('Could not play audio. Make sure your MP3 URLs are correct and accessible.');
                });
                isPlaying = true;
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            }
        });
        
        audio.addEventListener('ended', () => {
            isPlaying = false;
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        });
        
        // Volume control
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value / 100;
        });
    </script>
